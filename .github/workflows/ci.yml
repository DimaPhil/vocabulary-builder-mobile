name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and component tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage

  ios-build:
    name: ios-build
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prebuild iOS project
        run: npx expo prebuild --platform ios --non-interactive --clean

      - name: Build iOS simulator app
        run: |
          cd ios
          xcodebuild \
            -workspace VocabularyBuilder.xcworkspace \
            -scheme VocabularyBuilder \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro Max' \
            CODE_SIGNING_ALLOWED=NO \
            build
